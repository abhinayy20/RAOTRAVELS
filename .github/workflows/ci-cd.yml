      #     manifests: |
      #       k8s/frontend-deployment.yaml
      #       k8s/backend-deployment.yaml
      #       k8s/services.yaml
      #       k8s/ingress.yaml
      #     images: |
      #       ${{ env.DOCKER_FRONTEND_IMAGE }}:${{ github.sha }}
      #       ${{ env.DOCKER_BACKEND_IMAGE }}:${{ github.sha }}
      #     namespace: rao-travels
