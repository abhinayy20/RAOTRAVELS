<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | RAO TRAVELS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .success-container {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 5%;
        }
        
        .success-card {
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 25px;
            text-align: center;
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(0, 212, 180, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        .success-icon i {
            font-size: 3rem;
            color: var(--teal);
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 180, 0.3); }
            50% { box-shadow: 0 0 30px 10px rgba(0, 212, 180, 0.1); }
        }
        
        .success-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--gold);
        }
        
        .success-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 35px;
        }
        
        .booking-details {
            text-align: left;
            margin-bottom: 35px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.95rem;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: var(--text-muted);
        }
        
        .detail-value {
            color: #fff;
            font-weight: 600;
        }
        
        .detail-value.highlight {
            color: var(--gold);
            font-family: var(--font-accent);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        .success-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .success-actions a {
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .loading-state {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .loading-state i {
            font-size: 2rem;
            color: var(--gold);
            display: block;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="logo">RAO<span style="color: var(--text-primary); font-weight: 300;">TRAVELS</span></a>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#packages">Packages</a></li>
            <li><a href="index.html#destinations">Destinations</a></li>
            <li><a href="index.html#about">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <a href="https://wa.me/917985815601" target="_blank" class="btn-primary" style="display:inline-block;">Enquire Now</a>
        </div>
    </nav>

    <!-- Success Content -->
    <div class="success-container">
        <div class="glass success-card" id="success-card">
            <!-- Loading state (replaced by JS) -->
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                Loading your booking details...
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 RAO TRAVELS. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script>
        const API_BASE = 'http://localhost:5000/api/bookings';

        const getBookingId = () => {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        };

        const formatPrice = (price) => '₹' + Number(price).toLocaleString('en-IN');

        const formatDate = (dateStr) => {
            return new Date(dateStr).toLocaleDateString('en-IN', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
        };

        const renderSuccess = (booking) => {
            const card = document.getElementById('success-card');
            const tourName = booking.tourId ? booking.tourId.title : 'Tour';
            const tourLocation = booking.tourId ? booking.tourId.location : '';

            card.innerHTML = `
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h1 class="success-title">Booking Confirmed!</h1>
                <p class="success-subtitle">Thank you, ${booking.name}! Your booking has been received successfully.</p>
                
                <div class="booking-details">
                    <div class="detail-row">
                        <span class="detail-label">Booking ID</span>
                        <span class="detail-value highlight">${booking._id}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Tour</span>
                        <span class="detail-value">${tourName}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Location</span>
                        <span class="detail-value">${tourLocation}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Travel Date</span>
                        <span class="detail-value">${formatDate(booking.date)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Travelers</span>
                        <span class="detail-value">${booking.travelers} Person(s)</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Total Price</span>
                        <span class="detail-value highlight">${formatPrice(booking.totalPrice)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Status</span>
                        <span class="detail-value" style="color: var(--teal);">✓ ${booking.status}</span>
                    </div>
                </div>
                
                <div class="success-actions">
                    <a href="index.html" class="btn-outline">← Back Home</a>
                    <a href="https://wa.me/917985815601?text=Hello,%20my%20booking%20ID%20is%20${booking._id}.%20Please%20confirm." target="_blank" class="btn-primary">
                        <i class="fab fa-whatsapp"></i> Confirm via WhatsApp
                    </a>
                </div>
            `;
        };

        const renderError = (msg) => {
            const card = document.getElementById('success-card');
            card.innerHTML = `
                <i class="fas fa-exclamation-circle" style="font-size:4rem; color:var(--gold); margin-bottom:20px;"></i>
                <h2 style="margin-bottom:10px;">Booking Not Found</h2>
                <p style="color:var(--text-muted); margin-bottom:30px;">${msg}</p>
                <a href="index.html#packages" class="btn-primary" style="display:inline-block;">← Browse Packages</a>
            `;
        };

        const loadBooking = async () => {
            const id = getBookingId();
            if (!id) { renderError('No booking ID provided.'); return; }

            try {
                const res = await fetch(`${API_BASE}/${id}`);
                const json = await res.json();

                if (!res.ok || !json.success) throw new Error(json.message || 'Not found');

                renderSuccess(json.data);
            } catch (err) {
                renderError(err.message || 'Could not load booking details.');
            }
        };

        loadBooking();
    </script>
</body>
</html>
