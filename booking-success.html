<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | RAO TRAVELS — Thank You!</title>
    <meta name="description" content="Your tour booking with RAO Travels has been confirmed. View your booking details and connect with our team on WhatsApp for assistance.">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .success-container {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 5%;
        }
        
        .success-card {
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 25px;
            text-align: center;
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(0, 212, 180, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        .success-icon i {
            font-size: 3rem;
            color: var(--teal);
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 180, 0.3); }
            50% { box-shadow: 0 0 30px 10px rgba(0, 212, 180, 0.1); }
        }
        
        .success-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--gold);
        }
        
        .success-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 35px;
        }
        
        .booking-details {
            text-align: left;
            margin-bottom: 35px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.95rem;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: var(--text-muted);
        }
        
        .detail-value {
            color: #fff;
            font-weight: 600;
        }
        
        .detail-value.highlight {
            color: var(--gold);
            font-family: var(--font-accent);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        
        .success-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .success-actions a {
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .loading-state {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .loading-state i {
            font-size: 2rem;
            color: var(--gold);
            display: block;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* ---- Workflow Status Tracker ---- */
        .workflow-track {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 0;
            margin: 28px 0 10px;
            padding: 20px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.07);
            overflow-x: auto;
        }
        .workflow-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1;
            min-width: 80px;
        }
        .wf-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            z-index: 1;
            position: relative;
            transition: all 0.3s;
        }
        .wf-line {
            position: absolute;
            top: 21px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 0;
        }
        .wf-line.done { background: #00d4b4; }
        .wf-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: #e6e8ec;
            margin-top: 10px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .wf-sublabel {
            font-size: 0.68rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 3px;
        }
        .workflow-step.done .wf-label  { color: #00d4b4; }
        .workflow-step.rejected .wf-label { color: #ff4d4d; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="logo">RAO<span style="color: var(--text-primary); font-weight: 300;">TRAVELS</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#packages">Packages</a></li>
            <li><a href="destinations.html">Destinations</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <a href="https://wa.me/917985815601" target="_blank" class="btn-primary" style="display:inline-block;">Enquire Now</a>
        </div>
    </nav>

    <!-- Success Content -->
    <div class="success-container">
        <div class="glass success-card" id="success-card">
            <!-- Loading state (replaced by JS) -->
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                Loading your booking details...
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 RAO TRAVELS. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script>
        const API_BASE = CONFIG.API_BASE + '/api/bookings';

        const getBookingId = () => {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        };

        const formatPrice = (price) => '₹' + Number(price).toLocaleString('en-IN');

        const formatDate = (dateStr) => {
            return new Date(dateStr).toLocaleDateString('en-IN', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
        };

        // ---- Workflow step helper ----
        const stepStatus = (booking) => {
            const s = booking.status;
            const vs = booking.vendorStatus || 'Pending';
            // step states: 0=pending, 1=done, 2=rejected
            const submitted = 1;
            const admin = s === 'Approved' || s === 'Confirmed' ? 1 : s === 'Rejected' ? 2 : 0;
            const vendor = vs === 'Accepted' ? 1 : vs === 'Rejected' ? 2 : 0;
            const confirmed = s === 'Confirmed' ? 1 : 0;
            const steps = [
                { label: 'Submitted', sublabel: 'Booking received', state: submitted, icon: 'fa-paper-plane' },
                { label: 'Admin Review', sublabel: admin === 1 ? 'Approved' : admin === 2 ? 'Rejected' : 'Pending review', state: admin, icon: 'fa-user-shield' },
                { label: 'Vendor Confirmation', sublabel: vendor === 1 ? 'Accepted' : vendor === 2 ? 'Rejected' : 'Awaiting vendor', state: vendor, icon: 'fa-handshake' },
                { label: 'Confirmed', sublabel: confirmed ? 'Trip confirmed!' : 'Pending', state: confirmed, icon: 'fa-check-double' },
            ];
            const colors = { 0: '#8b95a5', 1: '#00d4b4', 2: '#ff4d4d' };
            const icons  = { 0: 'fa-clock', 1: 'fa-check', 2: 'fa-times' };
            return `<div class="workflow-track">
                ${steps.map((step, i) => `
                    <div class="workflow-step ${step.state === 1 ? 'done' : step.state === 2 ? 'rejected' : ''}">
                        <div class="wf-icon" style="background:${colors[step.state]}22;border-color:${colors[step.state]};">
                            <i class="fas ${step.state > 0 ? icons[step.state] : step.icon}" style="color:${colors[step.state]};"></i>
                        </div>
                        ${i < steps.length - 1 ? `<div class="wf-line ${step.state === 1 ? 'done' : ''}"></div>` : ''}
                        <div class="wf-label">${step.label}</div>
                        <div class="wf-sublabel">${step.sublabel}</div>
                    </div>
                `).join('')}
            </div>`;
        };

        const renderSuccess = (booking) => {
            const card = document.getElementById('success-card');
            const tourName = booking.tourId ? booking.tourId.title : 'Tour';
            const tourLocation = booking.tourId ? booking.tourId.location : '';
            const isRejected = booking.status === 'Rejected';

            card.innerHTML = `
                <div class="success-icon" style="${isRejected ? 'background:rgba(255,77,77,0.1);' : ''}">
                    <i class="fas ${isRejected ? 'fa-times' : 'fa-check'}" style="${isRejected ? 'color:#ff4d4d;' : ''}"></i>
                </div>
                <h1 class="success-title" style="${isRejected ? 'color:#ff4d4d;' : ''}">${isRejected ? 'Booking Rejected' : 'Booking Received!'}</h1>
                <p class="success-subtitle">
                    ${isRejected
                        ? 'Sorry, this booking was not approved. Please contact us for assistance.'
                        : `Thank you, <strong>${booking.name}</strong>! Your booking is being processed.`}
                </p>

                <!-- Workflow Status Pipeline -->
                ${stepStatus(booking)}
                
                <div class="booking-details" style="margin-top:24px;">
                    <div class="detail-row">
                        <span class="detail-label">Booking ID</span>
                        <span class="detail-value highlight">${booking._id}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Tour</span>
                        <span class="detail-value">${tourName}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Location</span>
                        <span class="detail-value">${tourLocation}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Travel Date</span>
                        <span class="detail-value">${formatDate(booking.date)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Travelers</span>
                        <span class="detail-value">${booking.travelers} Person(s)</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Total Price</span>
                        <span class="detail-value highlight">${formatPrice(booking.totalPrice)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Booking Status</span>
                        <span class="detail-value" style="color:${booking.status==='Confirmed'?'#00d4b4':booking.status==='Rejected'?'#ff4d4d':'#fbbf24'}">
                            ${booking.status}
                        </span>
                    </div>
                    ${booking.assignedVendor ? `
                    <div class="detail-row">
                        <span class="detail-label">Assigned Vendor</span>
                        <span class="detail-value">${booking.assignedVendor}</span>
                    </div>` : ''}
                </div>
                
                <div class="success-actions">
                    <a href="index.html" class="btn-outline">← Back Home</a>
                    <a href="https://wa.me/917985815601?text=Hello,%20my%20booking%20ID%20is%20${booking._id}.%20I%20need%20an%20update." target="_blank" class="btn-primary">
                        <i class="fab fa-whatsapp"></i> Contact on WhatsApp
                    </a>
                </div>
            `;
        };

        const renderError = (msg) => {
            const card = document.getElementById('success-card');
            card.innerHTML = `
                <i class="fas fa-exclamation-circle" style="font-size:4rem; color:var(--gold); margin-bottom:20px;"></i>
                <h2 style="margin-bottom:10px;">Booking Not Found</h2>
                <p style="color:var(--text-muted); margin-bottom:30px;">${msg}</p>
                <a href="index.html#packages" class="btn-primary" style="display:inline-block;">← Browse Packages</a>
            `;
        };

        const loadBooking = async () => {
            const id = getBookingId();
            if (!id) { renderError('No booking ID provided.'); return; }

            try {
                const res = await fetch(`${API_BASE}/${id}`);
                const json = await res.json();

                if (!res.ok || !json.success) throw new Error(json.message || 'Not found');

                renderSuccess(json.data);
            } catch (err) {
                renderError(err.message || 'Could not load booking details.');
            }
        };

        loadBooking();
    </script>
</body>
</html>
