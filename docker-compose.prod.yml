version: '3.8'

services:
  backend:
    image: ${DOCKER_USERNAME}/rao-travels-backend:latest
    container_name: rao-travels-backend-prod
    restart: always
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - rao-prod-network

  frontend:
    image: ${DOCKER_USERNAME}/rao-travels-frontend:latest
    container_name: rao-travels-frontend-prod
    restart: always
    networks:
      - rao-prod-network

  nginx:
    image: nginx:alpine
    container_name: rao-travels-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - rao-prod-network

networks:
  rao-prod-network:
    driver: bridge
