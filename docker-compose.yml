version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rao-travels-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: always
    networks:
      - rao-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rao-travels-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - rao-network

networks:
  rao-network:
    driver: bridge
