apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: rao-travels
type: Opaque
data:
  # Values are base64 encoded versions of the .env variables
  MONGO_URI: BASE64_ENCODED_MONGO_URI_HERE
  JWT_SECRET: BASE64_ENCODED_JWT_SECRET_HERE
  OPENAI_API_KEY: BASE64_ENCODED_OPENAI_API_KEY_HERE
