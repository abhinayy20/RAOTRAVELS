global:
  scrape_interval: 15s # Set the default scrape interval to every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds

# A scrape configuration containing exactly one endpoint to scrape:
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "rao-backend"
    static_configs:
      - targets: ["backend:5000"] # Scrapes Express metrics via express-prom-bundle if loaded, or standard endpoint health checks

  - job_name: "rao-frontend"
    static_configs:
      - targets: ["frontend:80"] # Nginx stub status checks
