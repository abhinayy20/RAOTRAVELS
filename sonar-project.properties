# SonarQube Project Configuration
sonar.projectKey=rao-travels
sonar.projectName=RAO Travels
sonar.projectVersion=1.0

# Paths to source code
sonar.sources=.
sonar.exclusions=node_modules/**, backend/node_modules/**, k8s/**, .git/**, **/*.test.js, **/*.spec.js, vendor/**, js/vendor/**

# Language specific settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Backend specific
sonar.javascript.node.declarationFiles=true

# Frontend specific
sonar.sources=., css, js
sonar.tests=
