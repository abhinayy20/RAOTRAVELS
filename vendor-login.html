<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Vendor Login | RAO TRAVELS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0a0d12;
            --bg-card: #151a24;
            --bg-input: #1d2433;
            --gold: #f5c842;
            --teal: #00d4b4;
            --text: #e6e8ec;
            --text-muted: #8b95a5;
            --border: #252d3a;
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(245,200,66,0.06) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,212,180,0.05) 0%, transparent 70%);
            bottom: -80px;
            left: -80px;
            border-radius: 50%;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 45px 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-brand h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .login-brand .gold { color: var(--gold); }

        .login-brand p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .login-brand .vendor-icon {
            width: 60px;
            height: 60px;
            background: rgba(0,212,180,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
        }

        .vendor-icon i {
            font-size: 1.5rem;
            color: var(--teal);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--teal);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--teal);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }

        .login-btn:hover {
            background: #00e6c3;
            transform: translateY(-1px);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            display: none;
            background: rgba(255,77,77,0.1);
            border: 1px solid rgba(255,77,77,0.2);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .error-msg.show { display: block; }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--text-muted);
            font-size: 0.83rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link a:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="vendor-icon"><i class="fas fa-handshake"></i></div>
                <h1><span class="gold">RAO</span>TRAVELS</h1>
                <p>Vendor Partner Portal</p>
            </div>

            <div class="error-msg" id="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="vendor@raotravels.com" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Access Portal
                </button>
            </form>

            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Inline script for vendor login logic
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('login-email');
            const passwordInput = document.getElementById('login-password');
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            // If already logged in, redirect
            if(localStorage.getItem('vendorToken')) {
                window.location.href = 'vendor.html';
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                errorMsg.classList.remove('show');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

                try {
                    const res = await fetch('https://raotravels-backend.onrender.com/api/vendor/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await res.json();

                    if(res.ok && data.token) {
                        localStorage.setItem('vendorToken', data.token);
                        window.location.href = 'vendor.html';
                    } else {
                        errorMsg.textContent = data.message || 'Login failed. Please check your credentials.';
                        errorMsg.classList.add('show');
                    }
                } catch(error) {
                    console.error('Vendor login error:', error);
                    errorMsg.textContent = 'Server connection failed. Try again later.';
                    errorMsg.classList.add('show');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Portal';
                }
            });
        });
    </script>
</body>
</html>
