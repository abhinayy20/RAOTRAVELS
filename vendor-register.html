<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Vendor Registration | RAO TRAVELS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0a0d12;
            --bg-card: #151a24;
            --bg-input: #1d2433;
            --gold: #f5c842;
            --teal: #00d4b4;
            --text: #e6e8ec;
            --text-muted: #8b95a5;
            --border: #252d3a;
            --danger: #ff4d4d;
            --success: #34d399;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(245,200,66,0.06) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,212,180,0.05) 0%, transparent 70%);
            bottom: -80px;
            left: -80px;
            border-radius: 50%;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        .register-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .register-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 45px 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .register-brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-brand h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .register-brand .gold { color: var(--gold); }

        .register-brand p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .register-brand .vendor-icon {
            width: 60px;
            height: 60px;
            background: rgba(0,212,180,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
        }

        .vendor-icon i {
            font-size: 1.5rem;
            color: var(--teal);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--teal);
        }

        .input-wrapper select {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238b95a5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1.2em;
            padding-right: 32px;
        }

        .input-wrapper select:focus {
            border-color: var(--teal);
        }

        .register-btn {
            width: 100%;
            padding: 13px;
            background: var(--teal);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .register-btn:hover {
            background: #00e6c3;
            transform: translateY(-1px);
        }

        .register-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .message-box {
            display: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .message-box.error {
            background: rgba(255,77,77,0.1);
            border: 1px solid rgba(255,77,77,0.2);
            color: var(--danger);
        }

        .message-box.success {
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.2);
            color: var(--success);
        }

        .message-box.show { display: block; }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--text-muted);
            font-size: 0.83rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link a:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-card">
            <div class="register-brand">
                <div class="vendor-icon"><i class="fas fa-user-plus"></i></div>
                <h1><span class="gold">RAO</span>TRAVELS</h1>
                <p>Vendor Partner Registration</p>
            </div>

            <div class="message-box" id="message-box"></div>

            <form id="register-form">
                <div class="form-group">
                    <label>Full Name *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="register-fullName" placeholder="John Doe" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label>Company Name *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-building"></i>
                        <input type="text" id="register-companyName" placeholder="Your Travel Company" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="register-email" placeholder="vendor@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="register-phone" placeholder="+91 9876543210" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Specialization</label>
                    <div class="input-wrapper">
                        <i class="fas fa-star"></i>
                        <select id="register-specialization">
                            <option value="Other">General Tours</option>
                            <option value="Adventure">Adventure</option>
                            <option value="Honeymoon">Honeymoon</option>
                            <option value="Group">Group</option>
                            <option value="Family">Family</option>
                            <option value="Luxury">Luxury</option>
                            <option value="Cultural">Cultural</option>
                            <option value="Budget">Budget</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Region *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="register-region" required>
                            <option value="">Select Region</option>
                            <option value="North">North India</option>
                            <option value="South">South India</option>
                            <option value="East">East India</option>
                            <option value="West">West India</option>
                            <option value="Northeast">Northeast India</option>
                            <option value="Central">Central India</option>
                            <option value="All India">All India</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password * (Min. 6 characters)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="register-password" placeholder="••••••" minlength="6" required>
                    </div>
                </div>

                <button type="submit" class="register-btn" id="register-btn">
                    <i class="fas fa-paper-plane"></i> Submit for Approval
                </button>
            </form>

            <div class="back-link">
                <a href="vendor-login.html">Already registered? Log in here</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('register-form');
            const fullNameInput = document.getElementById('register-fullName');
            const companyNameInput = document.getElementById('register-companyName');
            const emailInput = document.getElementById('register-email');
            const phoneInput = document.getElementById('register-phone');
            const specializationInput = document.getElementById('register-specialization');
            const regionInput = document.getElementById('register-region');
            const passwordInput = document.getElementById('register-password');
            const messageBox = document.getElementById('message-box');
            const btn = document.getElementById('register-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const fullName = fullNameInput.value.trim();
                const companyName = companyNameInput.value.trim();
                const email = emailInput.value.trim();
                const phone = phoneInput.value.trim();
                const specialization = specializationInput.value;
                const region = regionInput.value;
                const password = passwordInput.value;

                // Reset message box
                messageBox.className = 'message-box';
                messageBox.textContent = '';
                
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

                try {
                    const res = await fetch('https://raotravels-backend.onrender.com/api/vendor/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            fullName,
                            companyName,
                            email,
                            phone,
                            specialization,
                            region,
                            password
                        })
                    });

                    const data = await res.json();

                    if (res.ok && data.success) {
                        messageBox.textContent = 'Registration successful! Your account is pending admin approval. You can log in once approved.';
                        messageBox.classList.add('success', 'show');
                        form.reset();
                        
                        // Automatically redirect to login page after 3 seconds
                        setTimeout(() => {
                            window.location.href = 'vendor-login.html';
                        }, 3000);
                    } else {
                        messageBox.textContent = data.message || 'Registration failed. Please try again.';
                        messageBox.classList.add('error', 'show');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit for Approval';
                    }
                } catch (error) {
                    console.error('Vendor registration error:', error);
                    messageBox.textContent = 'Server connection failed. Try again later.';
                    messageBox.classList.add('error', 'show');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit for Approval';
                }
            });
        });
    </script>
</body>
</html>
