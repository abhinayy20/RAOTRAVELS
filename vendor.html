<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard | RAO TRAVELS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/vendor.css">
</head>
<body>

    <!-- Header -->
    <header class="vendor-header">
        <div class="brand-wrapper">
            <h1><span class="gold">RAO</span>TRAVELS</h1>
            <span class="vendor-badge"><i class="fas fa-handshake"></i> Vendor Portal</span>
        </div>
        <div class="header-right">
            <button id="logout-btn" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="page-title">
            <h2>Assigned Bookings</h2>
            <span id="booking-stats">Loading...</span>
        </div>

        <div id="vendor-content">
            <!-- Loading State -->
            <div class="loading-state" id="loading-state">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p>Loading your assignments...</p>
            </div>
            
            <!-- Bookings Grid -->
            <div class="bookings-grid" id="bookings-grid" style="display: none;">
                <!-- Cards will be injected here via JS -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display: none;">
                <i class="fas fa-box-open"></i>
                <h3>No pending assignments</h3>
                <p>You currently don't have any new bookings to process.</p>
            </div>
        </div>
    </main>

    <!-- Toasts -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/vendor.js"></script>
</body>
</html>
